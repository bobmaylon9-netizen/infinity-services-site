<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinity Services</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #020617, #000);
  color: white;
  overflow: hidden;
}

/* INTRO */
.intro {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
  animation: fadeOut 1s ease forwards;
  animation-delay: 3s;
}

@keyframes fadeOut {
  to {
    opacity: 0;
    visibility: hidden;
  }
}

/* iPhone */
.phone {
  width: 280px;
  height: 560px;
  border-radius: 45px;
  background: linear-gradient(160deg, #111827, #000);
  box-shadow: 
    0 0 60px rgba(99,102,241,0.5),
    inset 0 0 20px rgba(255,255,255,0.05);
  padding: 10px;
  transform: scale(0.5);
  animation: zoomIn 2s ease forwards;
}

@keyframes zoomIn {
  to { transform: scale(1); }
}

/* Tela */
.screen {
  width: 100%;
  height: 100%;
  border-radius: 35px;
  background: linear-gradient(180deg, #020617, #020617);
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  overflow: hidden;
}

/* Glow animado */
.screen::before {
  content: "";
  position: absolute;
  width: 300%;
  height: 300%;
  background: radial-gradient(circle, rgba(99,102,241,0.3), transparent);
  animation: rotate 8s linear infinite;
}

@keyframes rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* Texto */
.screen h1 {
  position: relative;
  font-size: 22px;
  z-index: 2;
  color: #818cf8;
  text-shadow: 0 0 20px #6366f1;
}

/* MAIN */
.main {
  text-align: center;
  padding: 120px 20px;
  opacity: 0;
  animation: showMain 1s ease forwards;
  animation-delay: 3.5s;
}

@keyframes showMain {
  to { opacity: 1; }
}

.main h2 {
  font-size: 42px;
}

.main p {
  max-width: 600px;
  margin: 20px auto;
  color: #9ca3af;
}

/* BOTÃO */
.btn {
  margin-top: 30px;
  padding: 14px 30px;
  border-radius: 12px;
  background: linear-gradient(135deg, #6366f1, #4f46e5);
  color: white;
  text-decoration: none;
  font-weight: bold;
  box-shadow: 0 0 20px rgba(99,102,241,0.5);
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro">
  <div class="phone">
    <div class="screen">
      <h1>Infinity Services</h1>
    </div>
  </div>
</div>

<!-- SITE -->
<div class="main">
  <h2>Infinity Services</h2>
  <p>
    Premium digital access and exclusive private member platform. 
    Experience curated content and next-level digital services.
  </p>

  <!-- COLOCA SEU LINK AQUI -->
  <a href="#" class="btn">Enter Private Access</a>
</div>

</body>
</html>
