<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinity Services</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #0f172a, #020617);
  font-family: Arial, sans-serif;
  color: white;
  overflow-x: hidden;
}

/* Animação inicial */
.intro {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
  animation: fadeOut 1s ease forwards;
  animation-delay: 3s;
}

@keyframes fadeOut {
  to {
    opacity: 0;
    visibility: hidden;
  }
}

/* Celular */
.phone {
  width: 260px;
  height: 520px;
  border-radius: 40px;
  background: linear-gradient(145deg, #1e293b, #020617);
  box-shadow: 0 0 40px rgba(99,102,241,0.6);
  display: flex;
  justify-content: center;
  align-items: center;
  transform: scale(0.5);
  animation: zoomIn 2s ease forwards;
}

@keyframes zoomIn {
  to {
    transform: scale(1);
  }
}

/* Tela do celular */
.screen {
  width: 90%;
  height: 90%;
  border-radius: 30px;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.screen h1 {
  font-size: 22px;
  color: #6366f1;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #6366f1; }
  to { text-shadow: 0 0 25px #6366f1; }
}

/* Conteúdo principal */
.main {
  text-align: center;
  padding: 100px 20px;
}

.main h2 {
  font-size: 40px;
  margin-bottom: 10px;
}

.main p {
  color: #94a3b8;
  max-width: 600px;
  margin: 0 auto;
}

.btn {
  margin-top: 30px;
  display: inline-block;
  padding: 14px 28px;
  background: #6366f1;
  border-radius: 10px;
  text-decoration: none;
  color: white;
  font-weight: bold;
  transition: 0.3s;
}

.btn:hover {
  background: #4f46e5;
}
</style>
</head>

<body>

<!-- Intro com celular -->
<div class="intro">
  <div class="phone">
    <div class="screen">
      <h1>Infinity Services</h1>
    </div>
  </div>
</div>

<!-- Site -->
<div class="main">
  <h2>Infinity Services</h2>
  <p>
    Premium digital access and exclusive private member platform. 
    We provide curated digital experiences for users worldwide.
  </p>

  <a href="#" class="btn">Get Access</a>
</div>

</body>
</html>
